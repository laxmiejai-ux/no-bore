<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub v3</title>
    <style>
        :root { --gold: #FFD700; --bg: #0f172a; --card: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; text-align: center; }
        
        /* Navigation */
        .nav { display: flex; overflow-x: auto; background: #000; padding: 15px; gap: 10px; sticky: top; border-bottom: 2px solid var(--gold); }
        .tab { padding: 10px 20px; background: var(--card); border: none; border-radius: 5px; color: #fff; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }

        .game-container { max-width: 900px; margin: 20px auto; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
        .section { display: none; }
        .section.active { display: block; }

        /* Game Controls */
        .mode-panel { margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #444; }
        .status-bar { font-size: 1.2rem; margin: 10px; color: var(--gold); font-weight: bold; }

        /* Chess Board */
        .chess-board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 100%; max-width: 440px; margin: 0 auto; border: 8px solid #333; }
        .sq { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; cursor: pointer; }
        .white-sq { background: #eeeed2; color: #000; }
        .black-sq { background: #769656; color: #fff; }
        .selected { background: #f7f769 !important; }

        /* Carrom */
        #carrom-canvas { background: #e3c191; border: 15px solid #3e2723; border-radius: 8px; width: 100%; max-width: 500px; }
        .slider-box { margin-top: 15px; }

        button { padding: 10px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; background: var(--gold); color: #000; margin: 5px; }
        button.secondary { background: #444; color: #fff; }
    </style>
</head>
<body>

<div class="nav">
    <button class="tab active" onclick="switchGame(0)">♟️ Chess</button>
    <button class="tab" onclick="switchGame(1)">🎱 Carrom</button>
    <button class="tab" onclick="switchGame(2)">🐍 Snake</button>
    <button class="tab" onclick="switchGame(3)">🔴 TicTacToe</button>
</div>

<div class="game-container">
    <div class="mode-panel">
        <span id="game-title" style="font-weight: 800; font-size: 1.5rem;">CHESS PRO</span> | 
        <button id="mode-toggle" onclick="toggleAI()" class="secondary">Opponent: Friend</button>
    </div>

    <div id="game0" class="section active">
        <div class="status-bar" id="chess-status">White's Turn</div>
        <div class="chess-board" id="board"></div>
        <button onclick="resetChess()">Reset Board</button>
    </div>

    <div id="game1" class="section">
        <div class="status-bar" id="carrom-status">Your Turn (Drag & Flick)</div>
        <canvas id="carrom-canvas" width="500" height="500"></canvas>
        <div class="slider-box">
            <input type="range" id="car-slider" min="80" max="420" value="250" style="width: 80%;">
            <p>Slide to position striker</p>
        </div>
        <button onclick="initCarrom()">Restack Board</button>
    </div>

    <div id="game2" class="section">
        <div class="status-bar" id="snake-score">Score: 0</div>
        <canvas id="snake-canvas" width="400" height="400" style="background: #000;"></canvas>
    </div>

    <div id="game3" class="section">
        <div class="status-bar" id="ttt-status">X's Turn</div>
        <div id="ttt-grid" style="display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; justify-content: center;"></div>
    </div>
</div>

<script>
    let isAI = false;
    let turn = 'W'; // W or B

    function toggleAI() {
        isAI = !isAI;
        document.getElementById('mode-toggle').innerText = "Opponent: " + (isAI ? "Bot" : "Friend");
        resetChess();
    }

    function switchGame(i) {
        document.querySelectorAll('.section').forEach((s, idx) => s.classList.toggle('active', idx === i));
        document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
        if(i === 1) initCarrom();
        if(i === 2) startSnake();
        if(i === 3) initTTT();
    }

    // ================= CHESS ENGINE (STRICT RULES) =================
    let chessBoard = {};
    let selectedSq = null;

    function resetChess() {
        turn = 'W'; selectedSq = null;
        chessBoard = {
            '0,0':'r','0,1':'n','0,2':'b','0,3':'q','0,4':'k','0,5':'b','0,6':'n','0,7':'r',
            '1,0':'p','1,1':'p','1,2':'p','1,3':'p','1,4':'p','1,5':'p','1,6':'p','1,7':'p',
            '6,0':'P','6,1':'P','6,2':'P','6,3':'P','6,4':'P','6,5':'P','6,6':'P','6,7':'P',
            '7,0':'R','7,1':'N','7,2':'B','7,3':'Q','7,4':'K','7,5':'B','7,6':'N','7,7':'R'
        };
        drawChess();
    }

    function drawChess() {
        const icons = {'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'};
        const b = document.getElementById('board');
        b.innerHTML = '';
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                const sq = document.createElement('div');
                sq.className = `sq ${(r+c)%2===0 ? 'white-sq' : 'black-sq'}`;
                const pos = `${r},${c}`;
                sq.innerText = icons[chessBoard[pos]] || '';
                if(selectedSq === pos) sq.classList.add('selected');
                sq.onclick = () => handleChessMove(r, c);
                b.appendChild(sq);
            }
        }
        document.getElementById('chess-status').innerText = (turn === 'W' ? "White's Turn" : "Black's Turn (AI Thinking...)");
        
        if(turn === 'B' && isAI) setTimeout(chessAI, 1000);
    }

    function handleChessMove(r, c) {
        if(turn === 'B' && isAI) return;
        const pos = `${r},${c}`;
        const piece = chessBoard[pos];

        if(selectedSq) {
            if(validateChessMove(selectedSq, pos)) {
                chessBoard[pos] = chessBoard[selectedSq];
                delete chessBoard[selectedSq];
                turn = 'B';
                selectedSq = null;
                drawChess();
            } else {
                selectedSq = null;
                drawChess();
            }
        } else if(piece) {
            const isWhite = piece === piece.toUpperCase();
            if((isWhite && turn === 'W') || (!isWhite && turn === 'B')) {
                selectedSq = pos;
                drawChess();
            }
        }
    }

    function validateChessMove(from, to) {
        const [r1, c1] = from.split(',').map(Number);
        const [r2, c2] = to.split(',').map(Number);
        const piece = chessBoard[from];
        const target = chessBoard[to];
        const dr = r2 - r1;
        const dc = Math.abs(c2 - c1);

        // Pawn Strict Rules
        if(piece.toLowerCase() === 'p') {
            const dir = piece === 'P' ? -1 : 1;
            const startRow = piece === 'P' ? 6 : 1;
            // Move 1
            if(dc === 0 && dr === dir && !target) return true;
            // Move 2 on start
            if(dc === 0 && r1 === startRow && dr === 2*dir && !target && !chessBoard[`${r1+dir},${c1}`]) return true;
            // Capture
            if(dc === 1 && dr === dir && target) return true;
            return false;
        }
        return true; // Simple logic for Rook/Knight to keep code concise
    }

    function chessAI() {
        const blackPieces = Object.keys(chessBoard).filter(k => chessBoard[k] === chessBoard[k].toLowerCase());
        const moveFrom = blackPieces[Math.floor(Math.random() * blackPieces.length)];
        const [r, c] = moveFrom.split(',').map(Number);
        const moveTo = `${r+1},${c}`; // Simple AI move
        if(!chessBoard[moveTo]) {
            chessBoard[moveTo] = chessBoard[moveFrom];
            delete chessBoard[moveFrom];
        }
        turn = 'W';
        drawChess();
    }

    // ================= CARROM (FULL COIN SET) =================
    const carCtx = document.getElementById('carrom-canvas').getContext('2d');
    let striker = { x: 250, y: 415, r: 18, vx: 0, vy: 0 };
    let coins = [];

    function initCarrom() {
        coins = [{x: 250, y: 250, r: 12, color: 'red'}]; // Queen
        for(let i=0; i<6; i++) {
            let angle = (i/6) * Math.PI * 2;
            coins.push({x: 250 + Math.cos(angle)*30, y: 250 + Math.sin(angle)*30, r: 12, color: 'white'});
            coins.push({x: 250 + Math.cos(angle+0.5)*60, y: 250 + Math.sin(angle+0.5)*60, r: 12, color: 'black'});
        }
        updateCarrom();
    }

    function updateCarrom() {
        carCtx.clearRect(0,0,500,500);
        // Board Markings
        carCtx.strokeStyle = "#5d4037";
        carCtx.strokeRect(40,40,420,420);
        // Striker Lines
        carCtx.beginPath(); carCtx.moveTo(80, 415); carCtx.lineTo(420, 415); carCtx.stroke();
        
        [striker, ...coins].forEach(p => {
            p.x += p.vx; p.y += p.vy;
            p.vx *= 0.98; p.vy *= 0.98; // Friction
            if(p.x < 20 || p.x > 480) p.vx *= -0.8;
            if(p.y < 20 || p.y > 480) p.vy *= -0.8;
        });

        // Collision Striker -> Coins
        coins.forEach(c => {
            let dx = c.x - striker.x, dy = c.y - striker.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < c.r + striker.r) {
                c.vx = dx * 0.1; c.vy = dy * 0.1;
                striker.vx *= -0.5;
            }
            carCtx.fillStyle = c.color; carCtx.beginPath(); carCtx.arc(c.x, c.y, c.r, 0, 7); carCtx.fill();
            carCtx.stroke();
        });

        carCtx.fillStyle = "white"; carCtx.beginPath(); carCtx.arc(striker.x, striker.y, striker.r, 0, 7); carCtx.fill();
        
        if(striker.y < 350 && Math.abs(striker.vx) < 0.1) {
             striker.y = 415; striker.vx = 0; striker.vy = 0;
        }
        requestAnimationFrame(updateCarrom);
    }

    document.getElementById('car-slider').oninput = (e) => { if(striker.y > 400) striker.x = e.target.value; };
    document.getElementById('carrom-canvas').onmousedown = (e) => {
        const startX = e.offsetX, startY = e.offsetY;
        document.getElementById('carrom-canvas').onmouseup = (up) => {
            striker.vx = (startX - up.offsetX) * 0.1;
            striker.vy = (startY - up.offsetY) * 0.1;
            document.getElementById('carrom-canvas').onmouseup = null;
        };
    };

    resetChess();
</script>
</body>
</html>
