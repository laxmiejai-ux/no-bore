<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Hub</title>
    <style>
        :root { --gold: #FFD93D; --bg: #1a1a1a; --card: #2d2d2d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; text-align: center; }
        
        /* Navigation */
        .nav { display: flex; overflow-x: auto; background: #000; padding: 10px; gap: 10px; sticky: top; }
        .tab-btn { padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--gold); color: #000; font-weight: bold; }

        .game-container { max-width: 800px; margin: 20px auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .section { display: none; }
        .section.active { display: block; }

        /* Chess Styles */
        .chess-board { display: grid; grid-template-columns: repeat(8, 50px); grid-template-rows: repeat(8, 50px); width: 400px; margin: 0 auto; border: 5px solid #333; }
        .cell { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .white-cell { background: #eeeed2; }
        .black-cell { background: #769656; }
        .selected { background: #f7f769 !important; }

        /* Carrom Styles */
        #carrom-canvas { background: #c29a6a; border: 15px solid #5d4037; border-radius: 10px; cursor: crosshair; }

        /* Ludo Styles */
        .ludo-wrapper { display: grid; grid-template-columns: repeat(15, 30px); grid-template-rows: repeat(15, 30px); margin: 0 auto; width: 450px; border: 2px solid #000; }
        .l-cell { border: 1px solid #ccc; background: #fff; position: relative; }
        .p1-home { background: #ff4d4d; } .p2-home { background: #4dff4d; }
        .token { width: 20px; height: 20px; border-radius: 50%; position: absolute; top: 5px; left: 5px; border: 2px solid #000; transition: 0.3s; z-index: 10; }
        
        canvas { display: block; margin: 0 auto; background: #000; }
        .controls { margin-top: 15px; }
        button { padding: 10px 25px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; background: var(--gold); }
    </style>
</head>
<body>

<h1>Elite Games Hub</h1>

<div class="nav" id="nav">
    <button class="tab-btn active" onclick="showGame('chess')">♟️ Chess</button>
    <button class="tab-btn" onclick="showGame('carrom')">🎱 Carrom</button>
    <button class="tab-btn" onclick="showGame('snake')">🐍 Snake</button>
    <button class="tab-btn" onclick="showGame('ludo')">🎲 Ludo</button>
</div>

<div class="game-container">
    <div id="chess" class="section active">
        <h2>Grandmaster Chess</h2>
        <div class="controls">
            <button onclick="initChess('friend')">PvP</button>
            <button onclick="initChess('bot')">vs CPU</button>
        </div>
        <div id="chess-board" class="chess-board"></div>
        <p id="chess-status">White's Turn</p>
    </div>

    <div id="carrom" class="section">
        <h2>Carrom Pro (Swipe to Hit)</h2>
        <canvas id="carrom-canvas" width="400" height="400"></canvas>
        <p>Drag the Striker and Release to shoot!</p>
        <button onclick="resetCarrom()">Reset Board</button>
    </div>

    <div id="snake" class="section">
        <h2>Viper Snake (Arrow Keys)</h2>
        <canvas id="snake-canvas" width="400" height="400"></canvas>
        <h3 id="snake-score">Score: 0</h3>
    </div>

    <div id="ludo" class="section">
        <h2>Royal Ludo</h2>
        <div id="ludo-board" class="ludo-wrapper"></div>
        <div class="controls">
            <p id="ludo-info">Player 1 Turn</p>
            <button onclick="rollLudo()">🎲 Roll Dice</button>
            <span id="dice-val" style="font-size: 24px; margin-left: 10px;">-</span>
        </div>
    </div>
</div>

<script>
    function showGame(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
        if(id === 'snake') startSnake();
    }

    // ================= CHESS LOGIC =================
    const chessBoard = document.getElementById('chess-board');
    let selectedSquare = null;
    let boardState = {};
    let turn = 'w';

    function initChess(mode) {
        boardState = {
            '0,0':'r','0,1':'n','0,2':'b','0,3':'q','0,4':'k','0,5':'b','0,6':'n','0,7':'r',
            '1,0':'p','1,1':'p','1,2':'p','1,3':'p','1,4':'p','1,5':'p','1,6':'p','1,7':'p',
            '6,0':'P','6,1':'P','6,2':'P','6,3':'P','6,4':'P','6,5':'P','6,6':'P','6,7':'P',
            '7,0':'R','7,1':'N','7,2':'B','7,3':'Q','7,4':'K','7,5':'B','7,6':'N','7,7':'R'
        };
        renderChess();
    }

    function renderChess() {
        const pieces = {
            'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟',
            'R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'
        };
        chessBoard.innerHTML = '';
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0 ? 'white-cell' : 'black-cell'}`;
                cell.dataset.pos = `${r},${c}`;
                cell.innerText = pieces[boardState[`${r},${c}`]] || '';
                cell.onclick = handleChessClick;
                if(selectedSquare === `${r},${c}`) cell.classList.add('selected');
                chessBoard.appendChild(cell);
            }
        }
    }

    function handleChessClick() {
        const pos = this.dataset.pos;
        const piece = boardState[pos];

        if (selectedSquare) {
            if (selectedSquare === pos) {
                selectedSquare = null;
            } else {
                boardState[pos] = boardState[selectedSquare];
                delete boardState[selectedSquare];
                selectedSquare = null;
                turn = turn === 'w' ? 'b' : 'w';
                document.getElementById('chess-status').innerText = `${turn === 'w' ? 'White' : 'Black'}'s Turn`;
            }
            renderChess();
        } else if (piece) {
            selectedSquare = pos;
            renderChess();
        }
    }

    // ================= CARROM LOGIC (PHYSICS) =================
    const carCanvas = document.getElementById('carrom-canvas');
    const carCtx = carCanvas.getContext('2d');
    let striker = { x: 200, y: 350, r: 15, vx: 0, vy: 0, color: '#fff' };
    let coins = [
        { x: 200, y: 200, r: 10, color: 'red' },
        { x: 180, y: 180, r: 10, color: 'black' },
        { x: 220, y: 180, r: 10, color: 'white' }
    ];
    let isDragging = false;

    function drawCarrom() {
        carCtx.clearRect(0, 0, 400, 400);
        // Draw Pockets
        carCtx.fillStyle = '#000';
        [ [20,20], [380,20], [20,380], [380,380] ].forEach(p => {
            carCtx.beginPath(); carCtx.arc(p[0], p[1], 25, 0, Math.PI*2); carCtx.fill();
        });

        // Move Striker
        striker.x += striker.vx; striker.y += striker.vy;
        striker.vx *= 0.98; striker.vy *= 0.98;

        // Simple Collision
        coins.forEach((c, i) => {
            let dx = striker.x - c.x, dy = striker.y - c.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < striker.r + c.r) {
                c.vx = -dx * 0.2; c.vy = -dy * 0.2;
                striker.vx *= -0.5;
            }
            if(c.vx) { 
                c.x += c.vx; c.y += c.vy; 
                c.vx *= 0.98; c.vy *= 0.98;
            }
            
            carCtx.fillStyle = c.color;
            carCtx.beginPath(); carCtx.arc(c.x, c.y, c.r, 0, Math.PI*2); carCtx.fill();
        });

        carCtx.fillStyle = striker.color;
        carCtx.beginPath(); carCtx.arc(striker.x, striker.y, striker.r, 0, Math.PI*2); carCtx.fill();
        requestAnimationFrame(drawCarrom);
    }

    carCanvas.onmousedown = (e) => { isDragging = true; };
    carCanvas.onmouseup = (e) => {
        if(isDragging) {
            let rect = carCanvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;
            striker.vx = (striker.x - mouseX) * 0.1;
            striker.vy = (striker.y - mouseY) * 0.1;
        }
        isDragging = false;
    };

    // ================= SNAKE (ARROWS) =================
    const snkCanvas = document.getElementById('snake-canvas');
    const snkCtx = snkCanvas.getContext('2d');
    let snake = [{x:10, y:10}];
    let food = {x:15, y:15};
    let dx = 1, dy = 0;
    let score = 0;

    function startSnake() {
        if(window.snkInterval) clearInterval(window.snkInterval);
        window.snkInterval = setInterval(() => {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('snake-score').innerText = `Score: ${score}`;
                food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
            } else { snake.pop(); }

            snkCtx.fillStyle = '#000'; snkCtx.fillRect(0,0,400,400);
            snkCtx.fillStyle = 'lime'; snake.forEach(s => snkCtx.fillRect(s.x*20, s.y*20, 18, 18));
            snkCtx.fillStyle = 'red'; snkCtx.fillRect(food.x*20, food.y*20, 18, 18);
        }, 150);
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowUp' && dy === 0) { dx=0; dy=-1; }
        if(e.key === 'ArrowDown' && dy === 0) { dx=0; dy=1; }
        if(e.key === 'ArrowLeft' && dx === 0) { dx=-1; dy=0; }
        if(e.key === 'ArrowRight' && dx === 0) { dx=1; dy=0; }
    });

    // ================= LUDO LOGIC =================
    function initLudo() {
        const board = document.getElementById('ludo-board');
        board.innerHTML = '';
        for(let i=0; i<225; i++) {
            const cell = document.createElement('div');
            cell.className = 'l-cell';
            if(i < 6 || (i > 8 && i < 15)) cell.classList.add('p1-home');
            board.appendChild(cell);
        }
    }

    function rollLudo() {
        const val = Math.floor(Math.random() * 6) + 1;
        document.getElementById('dice-val').innerText = val;
    }

    // Init All
    initChess();
    drawCarrom();
    initLudo();
</script>

</body>
</html>
