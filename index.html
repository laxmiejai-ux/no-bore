<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi-Game Arena</title>
<style>
  body { background:black; color:white; text-align:center; font-family:Arial; }
  button { margin:5px; padding:10px 20px; font-size:16px; }
  canvas { background:#222; margin:20px auto; display:block; }
</style>
</head>
<body>
<h1>🎮 Multi-Game Arena</h1>
<div id="menu">
  <button onclick="launchGame('ticTacToe')">Tic Tac Toe</button>
  <button onclick="launchGame('rps')">Rock Paper Scissors</button>
  <button onclick="launchGame('chess')">Chess</button>
  <button onclick="launchGame('carrom')">Carrom</button>
  <button onclick="launchGame('ludo')">Ludo</button>
</div>
<div id="gameArea"></div>

<script>
// Menu
function launchGame(game){
  const area=document.getElementById("gameArea");
  area.innerHTML=`<h2>${game.toUpperCase()}</h2>
    <button onclick="startGame('${game}','friend')">Play vs Friend</button>
    <button onclick="startGame('${game}','bot')">Play vs Bot</button>
    <canvas id="canvas" width="500" height="500"></canvas>`;
}
function startGame(game,mode){
  if(game==="ticTacToe") runTicTacToe(mode);
  if(game==="rps") runRPS(mode);
  if(game==="chess") runChess(mode);
  if(game==="carrom") runCarrom(mode);
  if(game==="ludo") runLudo(mode);
}

// Tic Tac Toe
function runTicTacToe(mode){
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");
  let board=Array(9).fill(null); let current="X";
  canvas.onclick=function(e){
    let x=Math.floor(e.offsetX/166), y=Math.floor(e.offsetY/166);
    let i=y*3+x;
    if(board[i])return;
    board[i]=current; current=current==="X"?"O":"X"; draw();
    if(checkWin()) alert("Winner!"); else if(mode==="bot"&&current==="O") botMove();
  };
  function botMove(){
    let empty=board.map((c,i)=>c?null:i).filter(x=>x!==null);
    let choice=empty[Math.floor(Math.random()*empty.length)];
    board[choice]="O"; current="X"; draw();
    if(checkWin()) alert("Bot wins!");
  }
  function checkWin(){
    const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return wins.some(w=>board[w[0]]&&board[w[0]]===board[w[1]]&&board[w[1]]===board[w[2]]);
  }
  function draw(){
    ctx.clearRect(0,0,500,500);
    ctx.strokeStyle="white";
    for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(i*166,0);ctx.lineTo(i*166,500);ctx.stroke();
                         ctx.beginPath();ctx.moveTo(0,i*166);ctx.lineTo(500,i*166);ctx.stroke();}
    board.forEach((c,i)=>{
      if(c){ctx.fillStyle="white";ctx.font="60px Arial";
            ctx.fillText(c,(i%3)*166+50,Math.floor(i/3)*166+100);}
    });
  }
  draw();
}

// Rock Paper Scissors
function runRPS(mode){
  const canvas=document.getElementById("canvas");
  const ctx=canvas.getContext("2d");
  canvas.onclick=function(e){
    let choice=["Rock","Paper","Scissors"][Math.floor(e.offsetX/166)];
    let bot=["Rock","Paper","Scissors"][Math.floor(Math.random()*3)];
    ctx.clearRect(0,0,500,500);
    ctx.fillStyle="white";ctx.font="20px Arial";
    ctx.fillText("You: "+choice,50,200);
    ctx.fillText("Bot: "+bot,50,250);
    if(choice===bot) ctx.fillText("Draw!",50,300);
    else if((choice==="Rock"&&bot==="Scissors")||(choice==="Paper"&&bot==="Rock")||(choice==="Scissors"&&bot==="Paper"))
      ctx.fillText("You win!",50,300);
    else ctx.fillText("You lose!",50,300);
  };
  ctx.fillStyle="white";ctx.font="30px Arial";
  ctx.fillText("Click left=Rock, middle=Paper, right=Scissors",20,100);
}

// Chess with pawns moving 3 steps
function runChess(mode){
  const ctx=document.getElementById("canvas").getContext("2d");
  const size=8, cell=60;
  let board=[];
  for(let r=0;r<size;r++){board[r]=[];for(let c=0;c<size;c++){board[r][c]=null;}}
  for(let c=0;c<size;c++){board[1][c]="P";board[6][c]="p";}
  let selected=null;
  document.getElementById("canvas").onclick=function(e){
    let c=Math.floor(e.offsetX/cell), r=Math.floor(e.offsetY/cell);
    if(selected){board[r][c]=selected.piece;board[selected.r][selected.c]=null;selected=null;draw();}
    else if(board[r][c]){selected={r:r,c:c,piece:board[r][c]};}
  };
  function draw(){
    for(let r=0;r<size;r++){
      for(let c=0;c<size;c++){
        ctx.fillStyle=(r+c)%2===0?"#eee":"#555";
        ctx.fillRect(c*cell,r*cell,cell,cell);
        if(board[r][c]){
          ctx.fillStyle="black";ctx.font="20px Arial";
          ctx.fillText(board[r][c],c*cell+20,r*cell+35);
        }
      }
    }
  }
  draw();
}

// Carrom
function runCarrom(mode){
  const ctx=document.getElementById("canvas").getContext("2d");
  let coins=[{x:250,y:250,color:"red"}];
  for(let i=0;i<9;i++) coins.push({x:200+Math.random()*100,y:200+Math.random()*100,color:"white"});
  for(let i=0;i<9;i++) coins.push({x:200+Math.random()*100,y:200+Math.random()*100,color:"black"});
  function draw(){
    ctx.clearRect(0,0,500,500);
    ctx.strokeStyle="white";ctx.strokeRect(0,0,500,500);
    coins.forEach(c=>{ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(c.x,c.y,10,0,Math.PI*2);ctx.fill();});
  }
  draw();
}

// Ludo with 3-step moves
function runLudo(mode){
  const ctx=document.getElementById("canvas").getContext("2d");
  let tokens=[{x:50,y:50,color:"red",pos:0},{x:450,y:50,color:"green",pos:0},{x:50,y:450,color:"blue",pos:0},{x:450,y:450,color:"yellow",pos:0}];
  document.getElementById("canvas").onclick=function(){
    tokens.forEach(t=>{t.pos+=3; t.x=(t.pos*30)%500; t.y=50+Math.floor(t.pos/16)*30;});
    draw();
  };
  function draw(){
    ctx.clearRect(0,0,500,500);
    ctx.strokeStyle="white";ctx.strokeRect(0,0,500,500);
    tokens.forEach(t=>{ctx.fillStyle=t.color;ctx.beginPath();ctx.arc(t.x,t.y,15,0,Math.PI*2);ctx.fill();});
  }
  draw();
}
</script>
</body>
</html>
