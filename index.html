<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grandmaster Hub</title>
    <style>
        :root { --gold: #ffd700; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; text-align: center; }
        
        .nav { background: #000; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid var(--gold); }
        .tab { padding: 8px 20px; cursor: pointer; background: #1e293b; border-radius: 5px; }
        .tab.active { background: var(--gold); color: #000; font-weight: bold; }

        .game-box { max-width: 600px; margin: 20px auto; background: #1e293b; padding: 20px; border-radius: 12px; }
        .hidden { display: none; }

        /* Chess Board */
        .board { display: grid; grid-template-columns: repeat(8, 12.5%); width: 400px; height: 400px; margin: 0 auto; border: 5px solid #333; }
        .sq { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .l-sq { background: #eeeed2; color: #000; } .d-sq { background: #769656; color: #fff; }
        .selected { background: #f6f669 !important; }
        .hint { background: rgba(255, 215, 0, 0.3) !important; }

        /* Carrom */
        canvas { background: #eddcae; border: 15px solid #3d2b1f; border-radius: 8px; cursor: crosshair; }
        .status { margin: 10px; font-size: 1.1rem; color: var(--gold); }
    </style>
</head>
<body>

<div class="nav">
    <div class="tab active" onclick="show(0)">тЩЯя╕П Chess</div>
    <div class="tab" onclick="show(1)">ЁЯО▒ Carrom</div>
</div>

<div class="game-box" id="g0">
    <div class="status" id="chess-status">White's Turn</div>
    <div class="board" id="chess-board"></div>
    <p style="font-size: 12px; margin-top: 10px;">Pawns move 2 on start, 1 after. Captures diagonally.</p>
</div>

<div class="game-box hidden" id="g1">
    <div class="status">Drag Striker and Release to Shoot</div>
    <canvas id="carrom-canvas" width="450" height="450"></canvas>
    <input type="range" id="car-slider" min="80" max="370" value="225" style="width: 80%;">
</div>

<script>
    function show(i) {
        document.querySelectorAll('.game-box').forEach((b, idx) => b.classList.toggle('hidden', idx !== i));
        document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx !== i));
        if(i === 1) initCarrom();
    }

    // ================= CHESS: STRICT RULE VALIDATION =================
    let board = {};
    let selected = null;
    let turn = 'W';

    function initChess() {
        board = {
            '0,0':'r','0,1':'n','0,2':'b','0,3':'q','0,4':'k','0,5':'b','0,6':'n','0,7':'r',
            '1,0':'p','1,1':'p','1,2':'p','1,3':'p','1,4':'p','1,5':'p','1,6':'p','1,7':'p',
            '6,0':'P','6,1':'P','6,2':'P','6,3':'P','6,4':'P','6,5':'P','6,6':'P','6,7':'P',
            '7,0':'R','7,1':'N','7,2':'B','7,3':'Q','7,4':'K','7,5':'B','7,6':'N','7,7':'R'
        };
        renderBoard();
    }

    function renderBoard() {
        const icons = {'r':'тЩЬ','n':'тЩЮ','b':'тЩЭ','q':'тЩЫ','k':'тЩЪ','p':'тЩЯ','R':'тЩЦ','N':'тЩШ','B':'тЩЧ','Q':'тЩХ','K':'тЩФ','P':'тЩЩ'};
        const bEl = document.getElementById('chess-board');
        bEl.innerHTML = '';
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                const sq = document.createElement('div');
                sq.className = `sq ${(r+c)%2===0 ? 'l-sq' : 'd-sq'}`;
                const pos = `${r},${c}`;
                if(selected === pos) sq.classList.add('selected');
                sq.innerText = icons[board[pos]] || '';
                sq.onclick = () => handleMove(r, c);
                bEl.appendChild(sq);
            }
        }
    }

    function handleMove(r, c) {
        const pos = `${r},${c}`;
        if(selected) {
            if(validateMove(selected, pos)) {
                board[pos] = board[selected];
                delete board[selected];
                turn = turn === 'W' ? 'B' : 'W';
                document.getElementById('chess-status').innerText = `${turn === 'W' ? 'White' : 'Black'}'s Turn`;
            }
            selected = null;
            renderBoard();
        } else if(board[pos]) {
            const piece = board[pos];
            if((turn === 'W' && piece === piece.toUpperCase()) || (turn === 'B' && piece === piece.toLowerCase())) {
                selected = pos;
                renderBoard();
            }
        }
    }

    function validateMove(from, to) {
        const [r1, c1] = from.split(',').map(Number);
        const [r2, c2] = to.split(',').map(Number);
        const piece = board[from];
        const dr = r2 - r1;
        const dc = Math.abs(c2 - c1);

        // --- PAWN RULES ---
        if(piece.toLowerCase() === 'p') {
            const dir = piece === 'P' ? -1 : 1;
            const startRow = piece === 'P' ? 6 : 1;
            
            // Standard 1-step move
            if(dc === 0 && dr === dir && !board[to]) return true;
            // First 2-step move
            if(dc === 0 && r1 === startRow && dr === 2 * dir && !board[to] && !board[`${r1+dir},${c1}`]) return true;
            // Diagonal Capture
            if(dc === 1 && dr === dir && board[to]) {
                const target = board[to];
                if((piece === 'P' && target === target.toLowerCase()) || (piece === 'p' && target === target.toUpperCase())) return true;
            }
            return false;
        }

        // --- ROOK RULES ---
        if(piece.toLowerCase() === 'r') {
            if(r1 !== r2 && c1 !== c2) return false;
            return true; // Simple version (collision check can be added)
        }

        return true; // Temporary allow others, focusing on Pawn Fix
    }

    // ================= CARROM: PHYSICS & SLIDER =================
    const cCanvas = document.getElementById('carrom-canvas');
    const ctx = cCanvas.getContext('2d');
    let striker = { x: 225, y: 370, r: 18, vx: 0, vy: 0 };
    let coins = [{x: 225, y: 225, r: 12, color: 'red'}, {x: 200, y: 200, r: 12, color: 'white'}];

    function initCarrom() {
        function loop() {
            ctx.clearRect(0,0,450,450);
            // Pockets
            ctx.fillStyle = "#111"; [[25,25],[425,25],[25,425],[425,425]].forEach(p => {
                ctx.beginPath(); ctx.arc(p[0],p[1],30,0,7); ctx.fill();
            });

            [striker, ...coins].forEach(p => {
                p.x += p.vx; p.y += p.vy;
                p.vx *= 0.98; p.vy *= 0.98;
                if(p.x < 20 || p.x > 430) p.vx *= -1;
                if(p.y < 20 || p.y > 430) p.vy *= -1;
            });

            // Striker to Coin collision
            coins.forEach(c => {
                let dx = c.x - striker.x, dy = c.y - striker.y;
                if(Math.sqrt(dx*dx + dy*dy) < c.r + striker.r) {
                    c.vx = dx * 0.15; c.vy = dy * 0.15;
                    striker.vx *= -0.5;
                }
                ctx.fillStyle = c.color; ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, 7); ctx.fill();
            });

            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(striker.x, striker.y, striker.r, 0, 7); ctx.fill();
            requestAnimationFrame(loop);
        }
        loop();
    }

    document.getElementById('car-slider').oninput = (e) => { striker.x = e.target.value; striker.y = 370; striker.vx = 0; striker.vy = 0; };
    cCanvas.onmousedown = (e) => {
        if(striker.y >= 370) {
            cCanvas.onmouseup = (up) => {
                striker.vx = (striker.x - up.offsetX) * 0.12;
                striker.vy = (striker.y - up.offsetY) * 0.12;
                cCanvas.onmouseup = null;
            };
        }
    };

    initChess();
</script>
</body>
</html>
