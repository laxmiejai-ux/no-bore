<!DOCTYPE html>
<html>
<head>
  <title>Two Player Games Hub</title>
  <style>
    body { background: black; color: white; font-family: Arial; text-align: center; }
    .menu { margin: 20px; }
    .board { display: grid; margin: 20px auto; }
    .cell { border: 2px solid #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 2em; }
    .blue { color: blue; }
    .red { color: red; }
    canvas { background: #111; display: block; margin: 20px auto; }
  </style>
</head>
<body>
  <h1>🎮 Two Player Games Hub</h1>
  <div class="menu">
    <button onclick="startGame('tictactoe')">Tic Tac Toe</button>
    <button onclick="startGame('connectfour')">Connect Four</button>
    <button onclick="startGame('chess')">Chess</button>
    <button onclick="startGame('carrom')">Carrom</button>
    <button onclick="startGame('cornhole')">Cornhole</button>
  </div>
  <div>
    <button onclick="setMode('friend')">Play with Friend</button>
    <button onclick="setMode('bot')">Play with Bot</button>
  </div>
  <p id="status"></p>
  <div id="gameArea"></div>

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <script>
    let mode = "friend";
    let currentPlayer = "blue"; 
    let gameOver = false;
    let board = [];
    let activeGame = "";

    function setMode(m) {
      mode = m;
      document.getElementById("status").innerText = "Mode: " + m;
    }

    function startGame(game) {
      activeGame = game;
      gameOver = false;
      currentPlayer = "blue";
      if (game === "tictactoe") initTicTacToe();
      if (game === "connectfour") initConnectFour();
      if (game === "chess") initChess();
      if (game === "carrom") initCarrom();
      if (game === "cornhole") initCornhole();
    }

    // ------------------ TIC TAC TOE ------------------
    function initTicTacToe() {
      board = Array(9).fill("");
      const area = document.getElementById("gameArea");
      area.innerHTML = "";
      const grid = document.createElement("div");
      grid.className = "board";
      grid.style.gridTemplateColumns = "repeat(3,100px)";
      board.forEach((cell, i) => {
        const div = document.createElement("div");
        div.className = "cell";
        div.style.width = "100px"; div.style.height = "100px";
        div.onclick = () => makeMoveTicTacToe(i);
        grid.appendChild(div);
      });
      area.appendChild(grid);
      document.getElementById("status").innerText = "Tic Tac Toe: Blue starts";
    }
    // (same Tic Tac Toe logic as before...)

    // ------------------ CONNECT FOUR ------------------
    // (same Connect Four logic as before...)

    // ------------------ CHESS ------------------
    let chess, chessboard;
    function initChess() {
      const area = document.getElementById("gameArea");
      area.innerHTML = "<div id='chessboard' style='width:400px;margin:auto;'></div>";
      chess = new Chess();
      chessboard = Chessboard('chessboard', {
        draggable: true,
        position: 'start',
        onDrop: handleChessMove
      });
      document.getElementById("status").innerText = "Chess: White starts";
    }
    function handleChessMove(source, target) {
      let move = chess.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';
      document.getElementById("status").innerText = chess.turn()==='w' ? "White's turn" : "Black's turn";
      if (chess.game_over()) {
        document.getElementById("status").innerText = "Game Over!";
      }
    }

    // ------------------ CARROM ------------------
    function initCarrom() {
      const area = document.getElementById("gameArea");
      area.innerHTML = "<canvas id='carromCanvas' width='600' height='600'></canvas>";
      const canvas = document.getElementById("carromCanvas");
      const engine = Matter.Engine.create();
      const render = Matter.Render.create({
        canvas: canvas,
        engine: engine,
        options: { width: 600, height: 600, wireframes: false, background: '#000' }
      });
      // Add striker + coins + pockets here
      Matter.Engine.run(engine);
      Matter.Render.run(render);
      document.getElementById("status").innerText = "Carrom: Blue striker starts";
    }

    // ------------------ CORNHOLE ------------------
    function initCornhole() {
      const area = document.getElementById("gameArea");
      area.innerHTML = "<canvas id='cornholeCanvas' width='800' height='400'></canvas>";
      const canvas = document.getElementById("cornholeCanvas");
      const engine = Matter.Engine.create();
      const render = Matter.Render.create({
        canvas: canvas,
        engine: engine,
        options: { width: 800, height: 400, wireframes: false, background: '#000' }
      });
      // Add boards + beanbags + physics here
      Matter.Engine.run(engine);
      Matter.Render.run(render);
      document.getElementById("status").innerText = "Cornhole: Blue throws first";
    }
  </script>
</body>
</html>
