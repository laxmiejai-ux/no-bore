<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate 12-in-1 Game Hub</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Navigation Bar */
        .nav-scroll { display: flex; overflow-x: auto; background: #000; padding: 15px; gap: 10px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .tab-btn { padding: 10px 18px; background: #334155; color: white; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .container { max-width: 900px; margin: 30px auto; padding: 20px; min-height: 80vh; }
        .game-section { display: none; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .game-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        canvas { background: #000; border: 3px solid #475569; border-radius: 10px; max-width: 100%; height: auto; touch-action: none; }
        button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: #000; margin: 5px; transition: 0.2s; }
        button:hover { filter: brightness(1.2); transform: scale(1.05); }

        /* Chess Board */
        .chess-grid { display: grid; grid-template-columns: repeat(8, 1fr); width: 400px; height: 400px; margin: 0 auto; border: 4px solid #334155; }
        .chess-sq { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; }
        .light { background: #e2e8f0; color: #000; } .dark { background: #475569; color: #fff; }
        .selected { background: #fde047 !important; }

        /* Ludo Board */
        .ludo-grid { display: grid; grid-template-columns: repeat(15, 1fr); width: 450px; margin: 0 auto; border: 2px solid #000; background: #fff; }
        .ludo-sq { width: 30px; height: 30px; border: 1px solid #cbd5e1; position: relative; }
        .red { background: #ef4444; } .green { background: #22c55e; } .yellow { background: #eab308; } .blue { background: #3b82f6; }
        .pawn { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #000; position: absolute; top: 5px; left: 5px; cursor: pointer; z-index: 5; }
    </style>
</head>
<body>

<div class="nav-scroll">
    <button class="tab-btn active" onclick="tab(0)">♟️ Chess</button>
    <button class="tab-btn" onclick="tab(1)">🎱 Carrom</button>
    <button class="tab-btn" onclick="tab(2)">🐍 Snake</button>
    <button class="tab-btn" onclick="tab(3)">🎲 Ludo</button>
    <button class="tab-btn" onclick="tab(4)">🔴 Connect 4</button>
    <button class="tab-btn" onclick="tab(5)">🔢 2048</button>
    <button class="tab-btn" onclick="tab(6)">🧮 Quiz</button>
</div>

<div class="container">
    <section class="game-section active" id="s0">
        <h2>Grandmaster Chess</h2>
        <div class="chess-grid" id="chess-board"></div>
        <p id="chess-info" style="margin-top:15px">White's Turn</p>
        <button onclick="initChess()">Reset Game</button>
    </section>

    <section class="game-section" id="s1">
        <h2>Pro Carrom (Drag Striker to Shoot)</h2>
        <canvas id="carrom-canvas" width="500" height="500"></canvas>
        <p>Pull back from the striker and release!</p>
    </section>

    <section class="game-section" id="s2">
        <h2>Classic Snake</h2>
        <canvas id="snake-canvas" width="400" height="400"></canvas>
        <h3 id="snk-score">Score: 0</h3>
        <p>Use Arrow Keys to turn</p>
    </section>

    <section class="game-section" id="s3">
        <h2>Ludo Royal</h2>
        <div class="ludo-grid" id="ludo-board"></div>
        <div style="margin-top:20px">
            <button onclick="rollDice()">🎲 Roll Dice</button>
            <span id="dice-res" style="font-size: 24px; font-weight: bold; margin-left: 10px;">?</span>
        </div>
    </section>

    <section class="game-section" id="s4">
        <h2>Connect 4</h2>
        <div id="c4-board" style="display:inline-grid; grid-template-columns: repeat(7, 50px); gap: 5px; background: #1e40af; padding: 10px; border-radius: 10px;"></div>
    </section>
</div>

<script>
    function tab(i) {
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('s'+i).classList.add('active');
        document.querySelectorAll('.tab-btn')[i].classList.add('active');
        if(i === 2) startSnake();
        if(i === 1) initCarrom();
    }

    // --- CHESS ENGINE (Movement Logic) ---
    let chessSelected = null;
    let chessBoard = {};
    function initChess() {
        chessBoard = {
            '0,0':'r','0,1':'n','0,2':'b','0,3':'q','0,4':'k','0,5':'b','0,6':'n','0,7':'r',
            '1,0':'p','1,1':'p','1,2':'p','1,3':'p','1,4':'p','1,5':'p','1,6':'p','1,7':'p',
            '6,0':'P','6,1':'P','6,2':'P','6,3':'P','6,4':'P','6,5':'P','6,6':'P','6,7':'P',
            '7,0':'R','7,1':'N','7,2':'B','7,3':'Q','7,4':'K','7,5':'B','7,6':'N','7,7':'R'
        };
        renderChess();
    }
    function renderChess() {
        const icons = {'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'};
        const container = document.getElementById('chess-board');
        container.innerHTML = '';
        for(let r=0; r<8; r++) {
            for(let c=0; c<8; c++) {
                let div = document.createElement('div');
                div.className = `chess-sq ${(r+c)%2===0 ? 'light' : 'dark'}`;
                if(chessSelected === `${r},${c}`) div.classList.add('selected');
                div.innerText = icons[chessBoard[`${r},${c}`]] || '';
                div.onclick = () => {
                    if(chessSelected) {
                        chessBoard[`${r},${c}`] = chessBoard[chessSelected];
                        delete chessBoard[chessSelected];
                        chessSelected = null;
                    } else if(chessBoard[`${r},${c}`]) {
                        chessSelected = `${r},${c}`;
                    }
                    renderChess();
                };
                container.appendChild(div);
            }
        }
    }

    // --- CARROM PHYSICS (Canvas) ---
    const carCtx = document.getElementById('carrom-canvas').getContext('2d');
    let striker = { x: 250, y: 420, r: 18, vx: 0, vy: 0 };
    let pucks = [{ x: 250, y: 250, r: 12, color: '#f00' }, { x: 230, y: 230, r: 12, color: '#fff' }];
    let isDragging = false, mousePos = {x:0, y:0};

    function initCarrom() {
        function update() {
            carCtx.fillStyle = '#8b4513'; carCtx.fillRect(0,0,500,500); // Board
            carCtx.fillStyle = '#111'; [ [30,30], [470,30], [30,470], [470,470] ].forEach(p => {
                carCtx.beginPath(); carCtx.arc(p[0], p[1], 30, 0, 7); carCtx.fill(); // Pockets
            });

            striker.x += striker.vx; striker.y += striker.vy;
            striker.vx *= 0.985; striker.vy *= 0.985; // Friction

            pucks.forEach(p => {
                let dx = p.x - striker.x, dy = p.y - striker.y;
                if(Math.sqrt(dx*dx + dy*dy) < p.r + striker.r) {
                    p.vx = dx * 0.2; p.vy = dy * 0.2;
                    striker.vx *= -0.5;
                }
                p.x += (p.vx || 0); p.y += (p.vy || 0);
                p.vx *= 0.98; p.vy *= 0.98;
                carCtx.fillStyle = p.color; carCtx.beginPath(); carCtx.arc(p.x, p.y, p.r, 0, 7); carCtx.fill();
            });

            carCtx.fillStyle = 'yellow'; carCtx.beginPath(); carCtx.arc(striker.x, striker.y, striker.r, 0, 7); carCtx.fill();
            requestAnimationFrame(update);
        }
        update();
    }
    document.getElementById('carrom-canvas').onmousedown = () => isDragging = true;
    document.getElementById('carrom-canvas').onmouseup = (e) => {
        if(isDragging) {
            let rect = e.target.getBoundingClientRect();
            striker.vx = (striker.x - (e.clientX - rect.left)) * 0.15;
            striker.vy = (striker.y - (e.clientY - rect.top)) * 0.15;
        }
        isDragging = false;
    };

    // --- SNAKE (Arrows) ---
    let snk = [{x:10, y:10}], dir = {x:1, y:0}, food = {x:5, y:5};
    function startSnake() {
        if(window.snkInt) clearInterval(window.snkInt);
        window.snkInt = setInterval(() => {
            let head = { x: snk[0].x + dir.x, y: snk[0].y + dir.y };
            snk.unshift(head);
            if(head.x === food.x && head.y === food.y) {
                food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) };
            } else snk.pop();

            const c = document.getElementById('snake-canvas').getContext('2d');
            c.fillStyle = '#000'; c.fillRect(0,0,400,400);
            c.fillStyle = '#0f0'; snk.forEach(p => c.fillRect(p.x*20, p.y*20, 18, 18));
            c.fillStyle = '#f00'; c.fillRect(food.x*20, food.y*20, 18, 18);
        }, 100);
    }
    window.onkeydown = (e) => {
        const k = e.key;
        if(k === 'ArrowUp' && dir.y === 0) dir = {x:0, y:-1};
        if(k === 'ArrowDown' && dir.y === 0) dir = {x:0, y:1};
        if(k === 'ArrowLeft' && dir.x === 0) dir = {x:-1, y:0};
        if(k === 'ArrowRight' && dir.x === 0) dir = {x:1, y:0};
    };

    initChess();
</script>
</body>
</html>
