<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin: 20px auto; }
    .cell { width: 100px; height: 100px; font-size: 2em; display: flex; align-items: center; justify-content: center; border: 2px solid #333; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <button onclick="setMode('friend')">Play with Friend</button>
  <button onclick="setMode('bot')">Play with Bot</button>
  <div class="board" id="board"></div>
  <p id="status"></p>

  <script>
    let board = ["","","","","","","","",""];
    let currentPlayer = "X";
    let mode = "friend";
    let gameOver = false;

    function setMode(m) {
      mode = m;
      resetGame();
    }

    function resetGame() {
      board = ["","","","","","","","",""];
      currentPlayer = "X";
      gameOver = false;
      document.getElementById("status").innerText = "Player X's turn";
      renderBoard();
    }

    function renderBoard() {
      const boardDiv = document.getElementById("board");
      boardDiv.innerHTML = "";
      board.forEach((cell, i) => {
        const div = document.createElement("div");
        div.className = "cell";
        div.innerText = cell;
        div.onclick = () => makeMove(i);
        boardDiv.appendChild(div);
      });
    }

    function makeMove(i) {
      if (board[i] !== "" || gameOver) return;
      board[i] = currentPlayer;
      checkWinner();
      if (!gameOver) {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        document.getElementById("status").innerText = `Player ${currentPlayer}'s turn`;
        if (mode === "bot" && currentPlayer === "O") botMove();
      }
      renderBoard();
    }

    function botMove() {
      // Simple bot: pick random empty cell
      let emptyCells = board.map((c, i) => c === "" ? i : null).filter(i => i !== null);
      let choice = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      makeMove(choice);
    }

    function checkWinner() {
      const wins = [
        [0,1,2],[3,4,5],[6,7,8], // rows
        [0,3,6],[1,4,7],[2,5,8], // cols
        [0,4,8],[2,4,6]          // diagonals
      ];
      for (let combo of wins) {
        const [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          document.getElementById("status").innerText = `Player ${board[a]} wins!`;
          gameOver = true;
          return;
        }
      }
      if (!board.includes("")) {
        document.getElementById("status").innerText = "It's a draw!";
        gameOver = true;
      }
    }

    resetGame();
  </script>
</body>
</html>
